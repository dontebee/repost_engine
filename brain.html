<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Second Brain · Donte Banks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06090f; --ink:#e8ecf4; --dim:#8b94a7; --line:rgba(139,148,167,.16);
    --sermon:#f0b429; --facebook:#5b9bd9; --onenote:#a97ee8; --email:#4ad18a;
    --gdrive:#35c9c0; --youtube:#e8756a; --note:#c9d16e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;overflow:hidden}
  #sky{position:fixed;inset:0;display:block}
  .vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 42%,transparent 0%,transparent 55%,rgba(3,5,9,.85) 100%)}
  header{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;flex-direction:column;
    align-items:center;padding:26px 16px 0;pointer-events:none}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(26px,4vw,40px);
    letter-spacing:.06em}
  h1 em{font-style:italic;color:var(--sermon)}
  .sub{margin-top:2px;font-size:11.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--dim)}
  .searchwrap{pointer-events:auto;margin-top:18px;width:min(680px,92vw);position:relative}
  #q{width:100%;padding:15px 130px 15px 22px;font:400 16px Inter;color:var(--ink);
    background:rgba(13,18,28,.72);border:1px solid var(--line);border-radius:999px;outline:none;
    backdrop-filter:blur(12px);transition:border-color .25s, box-shadow .25s}
  #q:focus{border-color:rgba(240,180,41,.55);box-shadow:0 0 0 4px rgba(240,180,41,.08),0 0 42px rgba(240,180,41,.10)}
  #go{position:absolute;right:6px;top:6px;bottom:6px;padding:0 22px;border:none;border-radius:999px;
    background:linear-gradient(135deg,#f0b429,#e08b1f);color:#1a1204;font:600 13.5px Inter;
    letter-spacing:.04em;cursor:pointer;transition:filter .2s}
  #go:hover{filter:brightness(1.1)}
  .modes{pointer-events:auto;display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--dim)}
  .modes label{display:flex;gap:6px;align-items:center;cursor:pointer}
  .chips{pointer-events:auto;display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
  .chip{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:999px;font-size:11.5px;
    letter-spacing:.05em;border:1px solid var(--line);color:var(--dim);cursor:pointer;
    background:rgba(13,18,28,.5);transition:all .2s;user-select:none}
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .chip.on{color:var(--ink);border-color:rgba(232,236,244,.35)}
  .chip.off{opacity:.35}
  #stats{position:fixed;bottom:16px;left:0;right:0;text-align:center;font-size:11px;
    letter-spacing:.24em;text-transform:uppercase;color:var(--dim);z-index:5;pointer-events:none}
  #hint{position:fixed;bottom:38px;left:0;right:0;text-align:center;font-size:12.5px;color:var(--dim);
    z-index:5;pointer-events:none;transition:opacity .6s}
  /* reading panel */
  #panel{position:fixed;top:0;right:0;bottom:0;width:min(520px,94vw);z-index:9;
    background:rgba(9,13,21,.94);backdrop-filter:blur(18px);border-left:1px solid var(--line);
    transform:translateX(103%);transition:transform .38s cubic-bezier(.2,.9,.25,1);
    display:flex;flex-direction:column}
  #panel.open{transform:translateX(0)}
  .phead{padding:22px 26px 16px;border-bottom:1px solid var(--line)}
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--dim)}
  .badge .dot{width:8px;height:8px;border-radius:50%}
  .ptitle{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-top:10px;line-height:1.25}
  .pmeta{margin-top:6px;font-size:12px;color:var(--dim)}
  #pbody{padding:22px 26px;overflow-y:auto;flex:1;font-size:14.5px;line-height:1.75;color:#cdd5e1;
    white-space:pre-wrap;word-wrap:break-word}
  #pbody::-webkit-scrollbar{width:8px}
  #pbody::-webkit-scrollbar-thumb{background:rgba(139,148,167,.25);border-radius:4px}
  #close{position:absolute;top:16px;right:18px;width:34px;height:34px;border-radius:50%;
    border:1px solid var(--line);background:transparent;color:var(--dim);font-size:16px;cursor:pointer}
  #close:hover{color:var(--ink)}
  /* answer card (ask mode) */
  #answer{pointer-events:auto;display:none;margin-top:16px;width:min(680px,92vw);
    max-height:44vh;overflow-y:auto;padding:20px 24px;border-radius:18px;
    background:rgba(11,16,26,.82);border:1px solid rgba(240,180,41,.22);
    backdrop-filter:blur(14px);box-shadow:0 12px 48px rgba(0,0,0,.5),0 0 60px rgba(240,180,41,.05)}
  #answer.show{display:block;animation:rise .4s cubic-bezier(.2,.9,.25,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  #atext{font-size:14.5px;line-height:1.8;color:#dde4ef;white-space:pre-wrap}
  #atext .cursor{display:inline-block;width:8px;background:var(--sermon);animation:pulse .8s infinite}
  #answer::-webkit-scrollbar{width:8px}
  #answer::-webkit-scrollbar-thumb{background:rgba(139,148,167,.25);border-radius:4px}
  #asrcs{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .srcpill{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;
    font-size:11px;color:var(--dim);border:1px solid var(--line);cursor:pointer;
    background:rgba(13,18,28,.6);transition:all .15s;max-width:240px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .srcpill:hover{color:var(--ink);border-color:rgba(232,236,244,.4)}
  .srcpill .dot{width:6px;height:6px;border-radius:50%;flex:none}
  #loading{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;display:none;
    font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sermon);
    text-shadow:0 0 24px rgba(240,180,41,.5);pointer-events:none}
  #loading.show{display:block;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
  @media (max-width:640px){ h1{font-size:24px} .sub{letter-spacing:.2em} }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="vignette"></div>

<header>
  <h1>Second <em>Brain</em></h1>
  <div class="sub">Donte Banks · GodChasers</div>
  <div class="searchwrap">
    <input id="q" placeholder="Ask me anything you've ever written… I remember all of it" autocomplete="off"/>
    <button id="go">Ask</button>
  </div>
  <div class="modes">
    <label><input type="radio" name="mode" value="ask" checked> ask me</label>
    <label><input type="radio" name="mode" value="meaning"> explore by meaning</label>
    <label><input type="radio" name="mode" value="exact"> exact words</label>
  </div>
  <div class="chips" id="chips"></div>
  <div id="answer">
    <div id="atext"></div>
    <div id="asrcs"></div>
  </div>
</header>

<div id="loading">firing synapses</div>
<div id="hint">17 years of sermons, posts, and notes — one living mind. Ask it something.</div>
<div id="stats">…</div>

<aside id="panel">
  <button id="close">✕</button>
  <div class="phead">
    <span class="badge"><span class="dot" id="bdot"></span><span id="bsrc"></span></span>
    <div class="ptitle" id="ptitle"></div>
    <div class="pmeta" id="pmeta"></div>
  </div>
  <div id="pbody"></div>
</aside>

<script>
const SB="https://eibrykdamgyoylnqknao.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpYnJ5a2RhbWd5b3lsbnFrbmFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTI1MjQsImV4cCI6MjA5Nzk4ODUyNH0.TXXVgPuoUJUjt4AIVZeLEq1qx3scGKYDdz04HAUbNcY";
const COLORS={sermon:"#f0b429",facebook:"#5b9bd9",onenote:"#a97ee8",email:"#4ad18a",
              gdrive:"#35c9c0",youtube:"#e8756a",note:"#c9d16e"};
const srcKey=s=>{s=(s||"").toLowerCase();
  for(const k of Object.keys(COLORS)) if(s.startsWith(k)) return k; return "note";};

async function rpc(fn,args){
  const r=await fetch(`${SB}/rest/v1/rpc/${fn}`,{method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify(args)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ---------- canvas / simulation ---------- */
const cv=document.getElementById("sky"),cx=cv.getContext("2d");
let W,H,DPR=Math.min(devicePixelRatio||1,2);
function size(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;
  cv.style.width=W+"px";cv.style.height=H+"px";cx.setTransform(DPR,0,0,DPR,0,0);}
size();addEventListener("resize",size);

let nodes=[],edges=[],pulses=[],mode="idle",hover=null,queryLabel="";
const CY=()=>H*0.56;

function seedIdle(){                        // ambient resting brain
  nodes=[];edges=[];pulses=[];mode="idle";
  const n=46;
  for(let i=0;i<n;i++){
    const keys=Object.keys(COLORS);
    nodes.push({x:Math.random()*W,y:H*0.25+Math.random()*H*0.7,
      vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,
      r:1.6+Math.random()*2.6,c:COLORS[keys[i%keys.length]],idle:true});
  }
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){
    const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<170&&Math.random()<.24) edges.push({a:i,b:j,w:.25});
  }
}
seedIdle();

function buildGraph(data){
  mode="graph";pulses=[];
  const N=data.nodes||[];
  const center={x:W/2,y:CY(),vx:0,vy:0,r:7,c:"#ffffff",center:true,label:queryLabel};
  nodes=[center];
  N.forEach((d,i)=>{
    const ang=(i/N.length)*Math.PI*2, rad=Math.min(W,H)*0.26+Math.random()*60;
    nodes.push({x:W/2+Math.cos(ang)*rad,y:CY()+Math.sin(ang)*rad,
      vx:0,vy:0,r:5+d.sim*11,c:COLORS[srcKey(d.source)],d,on:true});
  });
  edges=[];
  nodes.slice(1).forEach((n,i)=>edges.push({a:0,b:i+1,w:Math.max(.12,(n.d.sim-.35))*1.4,toCenter:true}));
  (data.edges||[]).forEach(e=>edges.push({a:e.a? nodes.findIndex(n=>n.d&&n.d.id===e.a):0,
                                          b:nodes.findIndex(n=>n.d&&n.d.id===e.b),w:(e.w-.45)*2.2}));
  edges=edges.filter(e=>e.a>=0&&e.b>=0);
}

function step(){
  const visible=n=>n.center||!n.d||chipOn[srcKey(n.d.source)];
  if(mode==="graph"){
    for(let i=1;i<nodes.length;i++){const a=nodes[i];if(!visible(a))continue;
      let fx=0,fy=0;
      for(let j=1;j<nodes.length;j++){if(i===j)continue;const b=nodes[j];if(!visible(b))continue;
        let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+40,f=2600/d2;
        fx+=dx*f/Math.sqrt(d2);fy+=dy*f/Math.sqrt(d2);}
      fx+=(W/2-a.x)*0.0009;fy+=(CY()-a.y)*0.0009;
      a.vx=(a.vx+fx)*0.86;a.vy=(a.vy+fy)*0.86;}
    edges.forEach(e=>{const a=nodes[e.a],b=nodes[e.b];if(!visible(a)||!visible(b))return;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,
      target=e.toCenter?190-60*e.w:150,f=(d-target)*0.0016*(0.5+e.w);
      const ux=dx/d,uy=dy/d;
      if(!a.center){a.vx+=ux*f*d*0.02;a.vy+=uy*f*d*0.02;}
      if(!b.center){b.vx-=ux*f*d*0.02;b.vy-=uy*f*d*0.02;}});
    nodes.forEach(n=>{if(n.center){n.x=W/2;n.y=CY();return;}
      n.x+=n.vx;n.y+=n.vy;
      n.x=Math.max(30,Math.min(W-30,n.x));n.y=Math.max(H*0.22,Math.min(H-70,n.y));});
    if(Math.random()<0.10&&edges.length){const e=edges[Math.random()*edges.length|0];
      if(visible(nodes[e.a])&&visible(nodes[e.b]))
        pulses.push({e,t:0,sp:0.008+Math.random()*0.012,dir:Math.random()<.5?1:-1});}
  }else{
    nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>W)n.vx*=-1;if(n.y<H*0.2||n.y>H)n.vy*=-1;});
    if(Math.random()<0.05&&edges.length)
      pulses.push({e:edges[Math.random()*edges.length|0],t:0,sp:0.006+Math.random()*0.008,dir:1});
  }
  pulses=pulses.filter(p=>(p.t+=p.sp)<1);
}

function draw(){
  cx.clearRect(0,0,W,H);
  const visible=n=>n.center||!n.d||chipOn[srcKey(n.d.source)];
  edges.forEach(e=>{const a=nodes[e.a],b=nodes[e.b];if(!a||!b||!visible(a)||!visible(b))return;
    const g=cx.createLinearGradient(a.x,a.y,b.x,b.y);
    g.addColorStop(0,a.c+"33");g.addColorStop(1,b.c+"33");
    cx.strokeStyle=mode==="idle"?"rgba(120,135,165,.10)":g;
    cx.lineWidth=mode==="idle"?0.6:0.5+e.w*1.6;
    cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();});
  pulses.forEach(p=>{const a=nodes[p.e.a],b=nodes[p.e.b];if(!a||!b||!visible(a)||!visible(b))return;
    const t=p.dir>0?p.t:1-p.t,x=a.x+(b.x-a.x)*t,y=a.y+(b.y-a.y)*t;
    cx.save();cx.globalCompositeOperation="lighter";
    cx.shadowBlur=14;cx.shadowColor=b.c;cx.fillStyle="#fff";
    cx.beginPath();cx.arc(x,y,1.7,0,7);cx.fill();cx.restore();});
  nodes.forEach(n=>{if(!visible(n))return;
    cx.save();cx.shadowBlur=n===hover?34:(n.center?30:16);cx.shadowColor=n.c;
    cx.fillStyle=n.c;cx.globalAlpha=n.idle?0.75:1;
    cx.beginPath();cx.arc(n.x,n.y,n===hover?n.r+2:n.r,0,7);cx.fill();cx.restore();
    if(n.center&&n.label){cx.font="italic 500 13px 'Cormorant Garamond',serif";
      cx.fillStyle="rgba(232,236,244,.85)";cx.textAlign="center";
      cx.fillText("“"+n.label+"”",n.x,n.y-16);}});
  if(hover&&hover.d){const n=hover;
    cx.font="500 12.5px Inter";cx.textAlign="center";
    const t=n.d.title.length>54?n.d.title.slice(0,52)+"…":n.d.title;
    const w=cx.measureText(t).width+20;
    cx.fillStyle="rgba(8,12,20,.92)";
    cx.beginPath();cx.roundRect(n.x-w/2,n.y-n.r-38,w,24,12);cx.fill();
    cx.fillStyle="#e8ecf4";cx.fillText(t,n.x,n.y-n.r-22);
    cx.font="400 10px Inter";cx.fillStyle="rgba(139,148,167,.9)";
    cx.fillText((n.d.date||"")+"  ·  "+n.d.source,n.x,n.y+n.r+16);}
  step();requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ---------- interaction ---------- */
cv.addEventListener("mousemove",e=>{
  hover=null;
  if(mode!=="graph")return;
  for(const n of nodes){if(!n.d)continue;
    if(Math.hypot(e.clientX-n.x,e.clientY-n.y)<n.r+9){hover=n;break;}}
  cv.style.cursor=hover?"pointer":"default";
});
cv.addEventListener("click",async()=>{
  if(!hover||!hover.d)return;
  openPanel(hover.d);
});
async function openPanel(d){
  const k=srcKey(d.source);
  document.getElementById("bdot").style.background=COLORS[k];
  document.getElementById("bsrc").textContent=d.source;
  document.getElementById("ptitle").textContent=d.title;
  document.getElementById("pmeta").textContent=(d.date||"")+"  ·  match "+Math.round(d.sim*100)+"%";
  document.getElementById("pbody").textContent="…";
  document.getElementById("panel").classList.add("open");
  try{const rows=await rpc("brain_get_item",{p_ref:d.ref});
    const it=rows&&rows[0];
    document.getElementById("pbody").textContent=it?it.body:"(not found)";
    if(it){document.getElementById("pmeta").textContent=
      [it.item_date,it.notebook,it.section].filter(Boolean).join("  ·  ");}
  }catch(e){document.getElementById("pbody").textContent="error: "+e.message;}
}
document.getElementById("close").onclick=()=>document.getElementById("panel").classList.remove("open");

/* ---------- chips ---------- */
const chipOn={sermon:true,facebook:true,onenote:true,email:true,gdrive:true,youtube:true,note:true};
const chipsEl=document.getElementById("chips");
document.querySelectorAll("input[name=mode]").forEach(r=>r.addEventListener("change",()=>{
  document.getElementById("go").textContent=
    document.querySelector("input[name=mode]:checked").value==="ask"?"Ask":"Search";
}));
[["sermon","Sermons"],["facebook","Facebook"],["onenote","OneNote"],["email","Email"],
 ["gdrive","Drive"],["youtube","YouTube"]].forEach(([k,label])=>{
  const c=document.createElement("div");c.className="chip on";
  c.innerHTML=`<span class="dot" style="background:${COLORS[k]}"></span>${label}`;
  c.onclick=()=>{chipOn[k]=!chipOn[k];c.className="chip "+(chipOn[k]?"on":"off");};
  chipsEl.appendChild(c);
});

/* ---------- search + ask ---------- */
const loading=document.getElementById("loading"),hint=document.getElementById("hint");
const answerEl=document.getElementById("answer"),atext=document.getElementById("atext"),
      asrcs=document.getElementById("asrcs");
let hist=[];   // rolling conversation for follow-up questions

function typewrite(el,text){
  el.innerHTML='<span class="cursor">&nbsp;</span>';
  let i=0;const cur=el.querySelector(".cursor");
  (function tick(){
    const chunk=text.slice(i,i+=3);
    cur.insertAdjacentText("beforebegin",chunk);
    if(i<text.length)setTimeout(tick,12);else cur.remove();
  })();
}

async function ask(q){
  loading.textContent="consulting memory";
  const r=await fetch(`${SB}/functions/v1/brain-chat`,{method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({question:q,history:hist})});
  if(!r.ok) throw new Error((await r.text()).slice(0,200));
  const j=await r.json();
  hist.push({role:"user",content:q},{role:"assistant",content:j.answer});
  hist=hist.slice(-6);
  answerEl.classList.add("show");
  typewrite(atext,j.answer);
  asrcs.innerHTML="";
  const seen=new Set();
  (j.sources||[]).forEach(s=>{
    if(seen.has(s.ref))return;seen.add(s.ref);
    const k=srcKey(s.source),p=document.createElement("div");
    p.className="srcpill";
    p.innerHTML=`<span class="dot" style="background:${COLORS[k]}"></span>${(s.date||"").slice(0,4)} · ${s.title}`;
    p.onclick=()=>openPanel({source:s.source,title:s.title,date:s.date,ref:s.ref,sim:s.sim||0});
    asrcs.appendChild(p);
  });
  buildGraph({nodes:(j.sources||[]).map((s,i)=>({id:i+1,source:s.source,title:s.title,
    snippet:"",date:s.date,ref:s.ref,sim:s.sim||0.5})),edges:[]});
}

async function search(){
  const q=document.getElementById("q").value.trim();
  if(!q)return;
  queryLabel=q;hint.style.opacity=0;loading.classList.add("show");
  document.getElementById("panel").classList.remove("open");
  try{
    const m=document.querySelector("input[name=mode]:checked").value;
    if(m==="ask"){
      await ask(q);
    }else if(m==="meaning"){
      answerEl.classList.remove("show");
      const g=await rpc("brain_graph",{query:q,match_count:18});
      buildGraph(g);
    }else{
      answerEl.classList.remove("show");
      const rows=await rpc("brain_keyword",{query:q,match_count:18});
      buildGraph({nodes:rows.map((r,i)=>({id:i+1,source:r.source,title:r.title,
        snippet:r.snippet,date:r.item_date,ref:r.ref,
        sim:Math.max(.4,Math.min(.95,r.rank))})),edges:[]});
    }
  }catch(e){alert("Search failed: "+e.message);}
  loading.classList.remove("show");
  loading.textContent="firing synapses";
}
document.getElementById("go").onclick=search;
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")search();});

/* ---------- stats ---------- */
(async()=>{
  try{
    const r=await fetch(`${SB}/rest/v1/rpc/brain_stats`,{method:"POST",
      headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},body:"{}"});
    if(r.ok){const s=await r.json();
      document.getElementById("stats").textContent=
        `${s.total.toLocaleString()} memories · ${s.earliest}–${s.latest} · sermons ${s.sermons.toLocaleString()} / facebook ${s.facebook.toLocaleString()} / notes ${s.notes.toLocaleString()}`;
      return;}
  }catch(_){}
  document.getElementById("stats").textContent="one mind · sermons · facebook · onenote · email";
})();
