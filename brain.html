<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Second Brain · Donte Banks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06090f; --ink:#e8ecf4; --dim:#8b94a7; --line:rgba(139,148,167,.16);
    --sermon:#f0b429; --facebook:#e07070; --onenote:#a97ee8; --email:#4ad18a;
    --gdrive:#35c9c0; --youtube:#5b9bd9; --note:#c9d16e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;overflow:hidden}
  #sky{position:fixed;inset:0;display:block}
  .vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%,transparent 0%,transparent 62%,rgba(3,5,9,.8) 100%)}
  header{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;flex-direction:column;
    align-items:center;padding:24px 16px 0;pointer-events:none}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(24px,3.4vw,36px);
    letter-spacing:.06em;text-shadow:0 2px 24px rgba(3,5,9,.9)}
  h1 em{font-style:italic;color:var(--sermon)}
  .sub{margin-top:2px;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--dim)}
  .searchwrap{pointer-events:auto;margin-top:16px;width:min(660px,92vw);position:relative}
  #q{width:100%;padding:14px 122px 14px 21px;font:400 15.5px Inter;color:var(--ink);
    background:rgba(13,18,28,.78);border:1px solid var(--line);border-radius:999px;outline:none;
    backdrop-filter:blur(12px);transition:border-color .25s, box-shadow .25s}
  #q:focus{border-color:rgba(240,180,41,.55);box-shadow:0 0 0 4px rgba(240,180,41,.08),0 0 42px rgba(240,180,41,.10)}
  #go{position:absolute;right:5px;top:5px;bottom:5px;padding:0 21px;border:none;border-radius:999px;
    background:linear-gradient(135deg,#f0b429,#e08b1f);color:#1a1204;font:600 13px Inter;
    letter-spacing:.04em;cursor:pointer;transition:filter .2s}
  #go:hover{filter:brightness(1.1)}
  .modes{pointer-events:auto;display:flex;gap:14px;margin-top:11px;font-size:11.5px;color:var(--dim)}
  .modes label{display:flex;gap:6px;align-items:center;cursor:pointer}
  .chips{pointer-events:auto;display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;justify-content:center;
    transition:opacity .4s}
  .chip{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:11px;
    letter-spacing:.05em;border:1px solid var(--line);color:var(--dim);cursor:pointer;
    background:rgba(13,18,28,.5);transition:all .2s;user-select:none}
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .chip.on{color:var(--ink);border-color:rgba(232,236,244,.35)}
  .chip.off{opacity:.35}
  #stats{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-size:10.5px;
    letter-spacing:.24em;text-transform:uppercase;color:var(--dim);z-index:5;pointer-events:none;
    transition:opacity .4s}
  #hint{position:fixed;bottom:34px;left:0;right:0;text-align:center;font-size:12px;color:var(--dim);
    z-index:5;pointer-events:none;transition:opacity .5s}
  /* answer card */
  #answer{pointer-events:auto;display:none;margin-top:16px;width:min(700px,93vw);
    max-height:46vh;overflow-y:auto;padding:20px 24px;border-radius:18px;
    background:rgba(10,14,23,.9);border:1px solid rgba(240,180,41,.20);
    backdrop-filter:blur(16px);box-shadow:0 16px 60px rgba(0,0,0,.62)}
  #answer.show{display:block;animation:rise .45s cubic-bezier(.2,.9,.25,1)}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  #atext{font-size:14.5px;line-height:1.78;color:#dde4ef;white-space:pre-wrap}
  #atext .cursor{display:inline-block;width:7px;background:var(--sermon);animation:blink .8s infinite}
  #answer::-webkit-scrollbar{width:7px}
  #answer::-webkit-scrollbar-thumb{background:rgba(139,148,167,.22);border-radius:4px}
  #asrcs{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .srcpill{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;
    font-size:10.5px;color:var(--dim);border:1px solid var(--line);cursor:pointer;
    background:rgba(13,18,28,.6);transition:all .15s;max-width:230px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .srcpill:hover{color:var(--ink);border-color:rgba(232,236,244,.4)}
  .srcpill .dot{width:6px;height:6px;border-radius:50%;flex:none}
  .dismiss{margin-top:14px;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
    color:rgba(139,148,167,.6);text-align:center}
  #loading{position:fixed;left:50%;z-index:6;display:none;white-space:nowrap;
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--sermon);
    text-shadow:0 0 24px rgba(240,180,41,.5);pointer-events:none;transform:translateX(-50%)}
  #loading.show{display:block;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
  /* reading panel */
  #panel{position:fixed;top:0;right:0;bottom:0;width:min(540px,95vw);z-index:9;
    background:rgba(9,13,21,.95);backdrop-filter:blur(18px);border-left:1px solid var(--line);
    transform:translateX(103%);transition:transform .4s cubic-bezier(.2,.9,.25,1);
    display:flex;flex-direction:column}
  #panel.open{transform:translateX(0)}
  .phead{padding:22px 26px 16px;border-bottom:1px solid var(--line)}
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--dim)}
  .badge .dot{width:8px;height:8px;border-radius:50%}
  .ptitle{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;margin-top:9px;line-height:1.25}
  .pmeta{margin-top:5px;font-size:11.5px;color:var(--dim)}
  #pscroll{overflow-y:auto;flex:1}
  #pscroll::-webkit-scrollbar{width:7px}
  #pscroll::-webkit-scrollbar-thumb{background:rgba(139,148,167,.22);border-radius:4px}
  #pcluster{margin:18px 26px 0;padding:15px 17px;border-radius:13px;
    background:rgba(240,180,41,.045);border:1px solid rgba(240,180,41,.18)}
  .clabel{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--sermon);opacity:.85}
  #ctext{margin-top:8px;font-size:13px;line-height:1.7;color:#cfd7e3}
  #cnbrs{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px}
  #pbody{padding:18px 26px 30px;font-size:14px;line-height:1.75;color:#c6cedb;
    white-space:pre-wrap;word-wrap:break-word}
  #close{position:absolute;top:15px;right:17px;width:32px;height:32px;border-radius:50%;
    border:1px solid var(--line);background:rgba(9,13,21,.8);color:var(--dim);font-size:15px;
    cursor:pointer;z-index:2}
  #close:hover{color:var(--ink)}
  @media (max-width:640px){ h1{font-size:23px} .sub{letter-spacing:.2em} #answer{max-height:46vh} }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="vignette"></div>

<header>
  <h1>Second <em>Brain</em></h1>
  <div class="sub">Donte Banks · GodChasers</div>
  <div class="searchwrap">
    <input id="q" placeholder="Ask me anything you've ever written… I remember all of it" autocomplete="off"/>
    <button id="go">Ask</button>
  </div>
  <div class="modes">
    <label><input type="radio" name="mode" value="ask" checked> ask me</label>
    <label><input type="radio" name="mode" value="meaning"> explore by meaning</label>
    <label><input type="radio" name="mode" value="exact"> exact words</label>
  </div>
  <div class="chips" id="chips"></div>
  <div id="answer">
    <div id="atext"></div>
    <div id="asrcs"></div>
    <div class="dismiss">click anywhere to return to the map</div>
  </div>
</header>

<div id="loading">searching memories</div>
<div id="hint">A living map of your words. Scroll to zoom, drag to wander, hover to see connections, click to read.</div>
<div id="stats">…</div>

<aside id="panel">
  <button id="close">✕</button>
  <div class="phead">
    <span class="badge"><span class="dot" id="bdot"></span><span id="bsrc"></span></span>
    <div class="ptitle" id="ptitle"></div>
    <div class="pmeta" id="pmeta"></div>
  </div>
  <div id="pscroll">
    <div id="pcluster">
      <div class="clabel">What connects here</div>
      <div id="ctext">…</div>
      <div id="cnbrs"></div>
    </div>
    <div id="pbody"></div>
  </div>
</aside>

<script>
const SB="https://eibrykdamgyoylnqknao.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpYnJ5a2RhbWd5b3lsbnFrbmFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTI1MjQsImV4cCI6MjA5Nzk4ODUyNH0.TXXVgPuoUJUjt4AIVZeLEq1qx3scGKYDdz04HAUbNcY";
const COLORS={sermon:"#f0b429",facebook:"#e07070",onenote:"#a97ee8",email:"#4ad18a",
              gdrive:"#35c9c0",youtube:"#5b9bd9",note:"#c9d16e"};
const srcKey=s=>{s=(s||"").toLowerCase();
  for(const k of Object.keys(COLORS)) if(s.startsWith(k)) return k; return "note";};
const rgba=(h,a)=>{const n=parseInt(h.slice(1),16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;};

async function rpc(fn,args){
  const r=await fetch(`${SB}/rest/v1/rpc/${fn}`,{method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify(args||{})});
  if(!r.ok) throw new Error((await r.text()).slice(0,200));
  return r.json();
}

/* ============================================================
   THE MAP — real memories, real semantic links.
   MAP state: Obsidian-style graph you can zoom/pan/hover/read.
   ORB state: everything draws into a slowly turning planet
              (no text) so the answer card owns the screen.
   ============================================================ */
const cv=document.getElementById("sky"),cx=cv.getContext("2d");
let W,H,DPR=Math.min(devicePixelRatio||1,2);
function size(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;
  cv.style.width=W+"px";cv.style.height=H+"px";cx.setTransform(DPR,0,0,DPR,0,0);
  positionLoading();}

const web={nodes:[],edges:[],adj:[]};
let hoverI=-1,nbrSet=new Set(),dragI=-1,panning=false,px=0,py=0;
let waves=[],lastWave=0,thinking=false,rot=0;
let orbT=0,orbTarget=0;                 // 0 = map, 1 = orb
const view={x:0,y:0,k:1};
const toScreen=(x,y)=>[x*view.k+view.x,y*view.k+view.y];
const toWorld=(x,y)=>[(x-view.x)/view.k,(y-view.y)/view.k];
const orbGeo=()=>({cx:W/2,cy:H*0.735,r:Math.max(78,Math.min(W,H)*0.115)});
function positionLoading(){const o=orbGeo();
  const el=document.getElementById("loading");
  el.style.top=(o.cy+o.r+30)+"px";}

// size() reaches orbGeo/positionLoading, so it only runs once those exist.
size();addEventListener("resize",size);

function buildWeb(data){
  const rows=data.nodes||[],eds=data.edges||[];
  web.nodes=[];web.edges=[];web.adj=[];waves=[];
  const N=rows.length;
  rows.forEach((r,i)=>{
    // fibonacci sphere seat for the orb
    const phi=Math.acos(1-2*(i+0.5)/N), th=Math.PI*(1+Math.sqrt(5))*(i+0.5);
    web.nodes.push({
      id:r.id, x:W/2+(Math.random()-.5)*W*0.55, y:H*0.5+(Math.random()-.5)*H*0.5,
      vx:0,vy:0,k:srcKey(r.source),deg:0,glow:0,born:performance.now()+i*9,
      ox:Math.sin(phi)*Math.cos(th), oy:Math.sin(phi)*Math.sin(th), oz:Math.cos(phi),
      d:{source:r.source,title:r.title||"",date:r.date,ref:r.ref}
    });
  });
  const byId=new Map(web.nodes.map((n,i)=>[n.id,i]));
  eds.forEach(e=>{
    const i=byId.get(e.a),j=byId.get(e.b);
    if(i===undefined||j===undefined||i===j)return;
    web.edges.push({i,j,w:e.w||0.5});
    web.nodes[i].deg++;web.nodes[j].deg++;
  });
  web.adj=Array.from({length:web.nodes.length},()=>[]);
  web.edges.forEach(e=>{web.adj[e.i].push(e.j);web.adj[e.j].push(e.i);});
  web.nodes.forEach(n=>{n.r=1.8+Math.min(7,Math.sqrt(n.deg)*2.1);});
  view.x=0;view.y=0;view.k=1;
}

async function loadWeb(){
  for(let a=0;a<4;a++){
    try{const d=await rpc("brain_web",{});
      if(d&&d.nodes&&d.nodes.length){buildWeb(d);return;}}
    catch(e){console.warn("web load retry",e);}
    await new Promise(r=>setTimeout(r,900*(a+1)));
  }
  buildWeb({nodes:Array.from({length:100},(_,i)=>({id:i+1,
    source:["sermon","facebook","onenote"][i%3],title:"",ref:"",date:null})),edges:[]});
}
loadWeb();

function seedWave(now){
  const n=web.nodes.length;if(!n)return;
  const seed=(Math.random()*n)|0;
  const dist=new Array(n).fill(-1);dist[seed]=0;
  const q=[seed];
  while(q.length){const u=q.shift();
    for(const v of web.adj[u])if(dist[v]<0){dist[v]=dist[u]+1;q.push(v);}}
  waves.push({t0:now,dist,hop:thinking?80:165,life:thinking?880:1500});
  if(waves.length>4)waves.shift();
}

function stepPhysics(now){
  const n=web.nodes;
  if(orbT<0.98){                        // map physics rests once fully orbed
    for(let i=0;i<n.length;i++){
      const p=n[i];if(now<p.born||i===dragI)continue;
      let fx=(W/2-p.x)*0.00020,fy=(H*0.52-p.y)*0.00020;
      for(let j=0;j<n.length;j++){
        if(i===j)continue;const o=n[j];if(now<o.born)continue;
        const dx=p.x-o.x,dy=p.y-o.y,d2=dx*dx+dy*dy;
        if(d2<44000&&d2>0.01){const f=40/d2;fx+=dx*f;fy+=dy*f;}}
      p.vx=(p.vx+fx)*0.905;p.vy=(p.vy+fy)*0.905;
    }
    for(const e of web.edges){
      const a=n[e.i],b=n[e.j];if(now<a.born||now<b.born)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;
      const rest=52+(1-e.w)*90;          // stronger meaning = closer together
      const f=(d-rest)*0.0055/d;
      if(e.i!==dragI){a.vx+=dx*f;a.vy+=dy*f;}
      if(e.j!==dragI){b.vx-=dx*f;b.vy-=dy*f;}
    }
    for(const p of n){if(now<p.born)continue;p.x+=p.vx;p.y+=p.vy;}
  }
  for(let i=0;i<n.length;i++){
    const p=n[i];let g=0;
    for(const w of waves){const d=w.dist[i];if(d<0)continue;
      const t=now-w.t0-d*w.hop;
      if(t>0&&t<w.life)g=Math.max(g,Math.sin((t/w.life)*Math.PI));}
    p.glow=g*(thinking?1:0.5);
  }
  if(now-lastWave>(thinking?600:5000)){seedWave(now);lastWave=now;}
  orbT+=(orbTarget-orbT)*0.055;          // smooth map <-> orb morph
  if(orbT<0.001)orbT=0; if(orbT>0.999)orbT=1;
  rot+=0.0016+0.0034*orbT;
}

// where a node draws right now, blending map position and orb seat
function posOf(p){
  const [sx,sy]=toScreen(p.x,p.y);
  if(orbT<=0) return [sx,sy,1,1];
  const o=orbGeo(),c=Math.cos(rot),s=Math.sin(rot);
  const X=p.ox*c-p.oz*s, Z=p.ox*s+p.oz*c;
  const persp=1/(1+Z*0.42);
  const ox=o.cx+X*o.r*persp*1.35, oy=o.cy+p.oy*o.r*persp*1.35;
  const depth=(Z+1)/2;                                   // 0 far, 1 near
  const t=orbT<1?ease(orbT):1;
  return [sx+(ox-sx)*t, sy+(oy-sy)*t, 1-0.55*(1-depth)*t, persp];
}
const ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

function draw(now){
  cx.clearRect(0,0,W,H);
  const hot=hoverI>=0&&orbT<0.4;
  const dim=1;
  // ---- edges
  for(const e of web.edges){
    const A=web.nodes[e.i],B=web.nodes[e.j];
    if(now<A.born||now<B.born)continue;
    const [ax,ay,aa]=posOf(A),[bx,by,ba]=posOf(B);
    const g=Math.max(A.glow,B.glow);
    let a=0.085*Math.min(aa,ba),col=`rgba(150,158,175,`,lw=0.5;
    if(hot){
      const on=(e.i===hoverI||e.j===hoverI);
      a=on?0.6:0.028;
      if(on){col=rgba(COLORS[A.k],1).replace(/,[^,]+\)$/,",");lw=1.15;}
    }else if(g>0.04){
      col=rgba(COLORS[A.k],1).replace(/,[^,]+\)$/,",");
      a=(0.09+g*0.5)*Math.min(aa,ba);lw=0.5+g*1.0;
    }else if(orbT>0.2){ a=(0.05+e.w*0.10)*Math.min(aa,ba)*0.9; }
    cx.strokeStyle=col+(a*dim)+")";cx.lineWidth=lw;
    cx.beginPath();cx.moveTo(ax,ay);cx.lineTo(bx,by);cx.stroke();
  }
  // ---- nodes (+ labels, which fade away as the orb forms)
  const labelBase=Math.max(0,Math.min(1,(view.k-0.55)/0.4))*(1-orbT);
  cx.textAlign="center";
  for(let i=0;i<web.nodes.length;i++){
    const p=web.nodes[i];if(now<p.born)continue;
    const grow=Math.min(1,(now-p.born)/520);
    const [sx,sy,da,persp]=posOf(p);
    if(sx<-50||sx>W+50||sy<-50||sy>H+50)continue;
    const c=COLORS[p.k];
    let a=0.62*da,rad=p.r*(orbT>0?(view.k*(1-orbT)+persp*0.85*orbT):view.k)*(0.4+0.6*grow);
    let gl=p.glow;
    if(hot){ if(i===hoverI){a=1;gl=1;rad*=1.25;} else if(nbrSet.has(i)){a=0.95;gl=Math.max(gl,0.45);} else a=0.09; }
    if(gl>0.04){cx.save();cx.shadowBlur=15*gl;cx.shadowColor=c;
      cx.fillStyle=rgba(c,Math.min(1,a+gl*0.4)*grow);
      cx.beginPath();cx.arc(sx,sy,rad*(1+gl*0.3),0,7);cx.fill();cx.restore();}
    else{cx.fillStyle=rgba(c,a*0.82*grow);
      cx.beginPath();cx.arc(sx,sy,rad,0,7);cx.fill();}
    const t=p.d.title;if(!t||labelBase<=0.02)continue;
    let la=labelBase*(0.15+Math.min(0.22,p.deg*0.028));
    if(hot){la=(i===hoverI)?0.95:(nbrSet.has(i)?0.72:0.02);}
    else if(gl>0.3)la=Math.max(la,gl*0.5);
    if(la<=0.02)continue;
    const fs=Math.max(7.5,Math.min(13,10*view.k));
    cx.font=`400 ${fs}px Inter`;cx.fillStyle=`rgba(196,204,218,${la*grow})`;
    const wide=hot&&(i===hoverI||nbrSet.has(i));
    cx.fillText(t.length>34&&!wide?t.slice(0,32)+"…":t,sx,sy+rad+fs+2);
  }
  // ---- orb halo
  if(orbT>0.05){
    const o=orbGeo();
    const g=cx.createRadialGradient(o.cx,o.cy,o.r*0.55,o.cx,o.cy,o.r*1.85);
    g.addColorStop(0,`rgba(240,180,41,${0.05*orbT})`);
    g.addColorStop(1,"rgba(240,180,41,0)");
    cx.fillStyle=g;cx.beginPath();cx.arc(o.cx,o.cy,o.r*1.85,0,7);cx.fill();
  }
  stepPhysics(now);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ---------- interaction ---------- */
function pick(mx,my){
  if(orbT>0.35)return -1;
  const [wx,wy]=toWorld(mx,my);
  let best=-1,bd=1e9;
  for(let i=0;i<web.nodes.length;i++){const p=web.nodes[i];
    const d=Math.hypot(wx-p.x,wy-p.y);
    if(d<(p.r+9)/Math.max(0.4,view.k)+4&&d<bd){bd=d;best=i;}}
  return best;
}
cv.addEventListener("mousemove",e=>{
  if(panning){view.x+=e.clientX-px;view.y+=e.clientY-py;px=e.clientX;py=e.clientY;return;}
  if(dragI>=0){const [wx,wy]=toWorld(e.clientX,e.clientY);
    web.nodes[dragI].x=wx;web.nodes[dragI].y=wy;web.nodes[dragI].vx=0;web.nodes[dragI].vy=0;return;}
  hoverI=pick(e.clientX,e.clientY);
  nbrSet=new Set(hoverI>=0?web.adj[hoverI]:[]);
  cv.style.cursor=hoverI>=0?"pointer":(orbT>0.35?"default":"grab");
});
cv.addEventListener("mousedown",e=>{
  if(orbT>0.35)return;
  const hit=pick(e.clientX,e.clientY);
  if(hit>=0){dragI=hit;dragStart=[e.clientX,e.clientY];cv.style.cursor="grabbing";}
  else{panning=true;px=e.clientX;py=e.clientY;cv.style.cursor="grabbing";}
});
let dragStart=[0,0];
addEventListener("mouseup",e=>{
  if(dragI>=0){
    if(Math.hypot(e.clientX-dragStart[0],e.clientY-dragStart[1])<4){
      const p=web.nodes[dragI]; if(p.d.ref) openPanel(p.d,p.id);
    }
    dragI=-1;
  }
  panning=false;cv.style.cursor="default";
});
cv.addEventListener("click",()=>{
  // click away from the answer: the orb unfolds back into the map
  if(orbT>0.35&&!thinking) backToMap();
});
cv.addEventListener("wheel",e=>{
  if(orbT>0.35)return;
  e.preventDefault();
  const k2=Math.max(0.35,Math.min(3,view.k*Math.exp(-e.deltaY*0.0011)));
  const [wx,wy]=toWorld(e.clientX,e.clientY);
  view.k=k2;view.x=e.clientX-wx*k2;view.y=e.clientY-wy*k2;
},{passive:false});
cv.addEventListener("dblclick",()=>{if(orbT<0.35){view.x=0;view.y=0;view.k=1;}});

function backToMap(){
  orbTarget=0;
  document.getElementById("answer").classList.remove("show");
  document.getElementById("chips").style.opacity="1";
  document.getElementById("stats").style.opacity="1";
  document.getElementById("hint").style.opacity="1";
}

/* ---------- panel: memory + what connects here ---------- */
const ctext=document.getElementById("ctext"),cnbrs=document.getElementById("cnbrs");
async function openPanel(d,nodeId){
  const k=srcKey(d.source);
  document.getElementById("bdot").style.background=COLORS[k];
  document.getElementById("bsrc").textContent=d.source;
  document.getElementById("ptitle").textContent=d.title||"(untitled)";
  document.getElementById("pmeta").textContent=d.date||"";
  document.getElementById("pbody").textContent="…";
  ctext.textContent="reading the connections…";cnbrs.innerHTML="";
  document.getElementById("pcluster").style.display=nodeId?"block":"none";
  document.getElementById("panel").classList.add("open");
  rpc("brain_get_item",{p_ref:d.ref}).then(rows=>{
    const it=rows&&rows[0];
    document.getElementById("pbody").textContent=it?(it.body||"(empty)"):"(not found)";
    if(it)document.getElementById("pmeta").textContent=
      [it.item_date,it.notebook,it.section].filter(Boolean).join("  ·  ");
  }).catch(e=>{document.getElementById("pbody").textContent="error: "+e.message;});
  if(!nodeId)return;
  try{
    const r=await fetch(`${SB}/functions/v1/brain-cluster`,{method:"POST",
      headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
      body:JSON.stringify({node_id:nodeId})});
    const j=await r.json();
    ctext.textContent=j.summary||j.error||"(no summary)";
    (j.neighbors||[]).slice(0,10).forEach(n=>{
      const p=document.createElement("div");p.className="srcpill";
      p.innerHTML=`<span class="dot" style="background:${COLORS[srcKey(n.source)]}"></span>${(n.date||"").slice(0,4)} · ${n.title}`;
      p.onclick=()=>{const idx=web.nodes.findIndex(x=>x.d.ref===n.ref);
        openPanel({source:n.source,title:n.title,date:n.date,ref:n.ref},
                  idx>=0?web.nodes[idx].id:null);};
      cnbrs.appendChild(p);
    });
  }catch(e){ctext.textContent="could not read the connections: "+e.message;}
}
document.getElementById("close").onclick=()=>document.getElementById("panel").classList.remove("open");

/* ---------- chips ---------- */
const chipsEl=document.getElementById("chips");
document.querySelectorAll("input[name=mode]").forEach(r=>r.addEventListener("change",()=>{
  document.getElementById("go").textContent=
    document.querySelector("input[name=mode]:checked").value==="ask"?"Ask":"Search";
}));
[["sermon","Sermons"],["facebook","Facebook"],["onenote","OneNote"],["email","Email"],
 ["gdrive","Drive"],["youtube","YouTube"]].forEach(([k,label])=>{
  const c=document.createElement("div");c.className="chip on";
  c.innerHTML=`<span class="dot" style="background:${COLORS[k]}"></span>${label}`;
  c.onclick=()=>{c.classList.toggle("on");c.classList.toggle("off");};
  chipsEl.appendChild(c);
});

/* ---------- ask ---------- */
const loading=document.getElementById("loading"),hint=document.getElementById("hint");
const answerEl=document.getElementById("answer"),atext=document.getElementById("atext"),
      asrcs=document.getElementById("asrcs");
let hist=[];
const THINK_LINES=["searching your memories","reading your sermons","walking back through the years",
  "cross-referencing Facebook","checking your notes","following the thread",
  "connecting the dots","reading the full text","comparing then to now","almost there"];
let thinkTimer=null;
function startThinking(){
  thinking=true;orbTarget=1;                       // draw the map into a planet
  answerEl.classList.remove("show");atext.innerHTML="";asrcs.innerHTML="";
  document.getElementById("panel").classList.remove("open");
  hint.style.opacity="0";
  document.getElementById("chips").style.opacity="0.25";
  document.getElementById("stats").style.opacity="0.3";
  positionLoading();loading.classList.add("show");
  let i=0;loading.textContent=THINK_LINES[0];
  thinkTimer=setInterval(()=>{loading.textContent=THINK_LINES[++i%THINK_LINES.length];},2300);
}
function stopThinking(){
  thinking=false;loading.classList.remove("show");
  if(thinkTimer){clearInterval(thinkTimer);thinkTimer=null;}
}
function typewrite(el,text){
  el.innerHTML='<span class="cursor">&nbsp;</span>';
  let i=0;const cur=el.querySelector(".cursor");
  (function tick(){
    cur.insertAdjacentText("beforebegin",text.slice(i,i+=3));
    if(i<text.length)setTimeout(tick,11);else cur.remove();
  })();
}
async function ask(q){
  const r=await fetch(`${SB}/functions/v1/brain-chat`,{method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({question:q,history:hist})});
  if(!r.ok) throw new Error((await r.text()).slice(0,200));
  const j=await r.json();
  hist.push({role:"user",content:q},{role:"assistant",content:j.answer});
  hist=hist.slice(-6);
  answerEl.classList.add("show");
  typewrite(atext,j.answer);
  asrcs.innerHTML="";
  const seen=new Set();
  (j.sources||[]).forEach(s=>{
    if(seen.has(s.ref))return;seen.add(s.ref);
    const p=document.createElement("div");p.className="srcpill";
    p.innerHTML=`<span class="dot" style="background:${COLORS[srcKey(s.source)]}"></span>${(s.date||"").slice(0,4)} · ${s.title}`;
    p.onclick=ev=>{ev.stopPropagation();
      const idx=web.nodes.findIndex(x=>x.d.ref===s.ref);
      openPanel({source:s.source,title:s.title,date:s.date,ref:s.ref},
                idx>=0?web.nodes[idx].id:null);};
    asrcs.appendChild(p);
  });
}
async function search(){
  const q=document.getElementById("q").value.trim();
  if(!q)return;
  startThinking();
  try{
    const m=document.querySelector("input[name=mode]:checked").value;
    if(m==="ask"){ await ask(q); }
    else{
      const rows=m==="meaning"
        ? (await rpc("brain_graph",{query:q,match_count:18})).nodes
        : (await rpc("brain_keyword",{query:q,match_count:18}))
            .map((r,i)=>({id:i+1,source:r.source,title:r.title,date:r.item_date,ref:r.ref,sim:r.rank}));
      answerEl.classList.add("show");
      atext.textContent=`${rows.length} memories closest to “${q}”. Open any of them below.`;
      asrcs.innerHTML="";
      rows.forEach(s=>{
        const p=document.createElement("div");p.className="srcpill";
        p.innerHTML=`<span class="dot" style="background:${COLORS[srcKey(s.source)]}"></span>${(s.date||"").slice(0,4)} · ${s.title}`;
        p.onclick=ev=>{ev.stopPropagation();
          const idx=web.nodes.findIndex(x=>x.d.ref===s.ref);
          openPanel({source:s.source,title:s.title,date:s.date,ref:s.ref},
                    idx>=0?web.nodes[idx].id:null);};
        asrcs.appendChild(p);
      });
    }
  }catch(e){
    answerEl.classList.add("show");
    atext.textContent="That search did not come back cleanly: "+e.message;
  }
  stopThinking();
  document.getElementById("q").select();
}
document.getElementById("go").onclick=search;
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")search();});
addEventListener("keydown",e=>{if(e.key==="Escape"){
  document.getElementById("panel").classList.remove("open");
  if(!thinking)backToMap();}});

/* ---------- stats ---------- */
rpc("brain_stats").then(s=>{
  document.getElementById("stats").textContent=
    `${s.total.toLocaleString()} memories · ${s.earliest}–${s.latest} · sermons ${s.sermons.toLocaleString()} / facebook ${s.facebook.toLocaleString()} / notes ${s.notes.toLocaleString()}`;
}).catch(()=>{document.getElementById("stats").textContent="one mind · sermons · facebook · onenote · email";});
</script>
